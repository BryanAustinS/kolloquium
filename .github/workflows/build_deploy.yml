name: Build and deploy

on:
  push:
    branches: [ master, main ]
    paths:
      - 'slides.md'
      - 'styles.css'
      - 'mermaid-init.html'
      - 'assets/**'
      - '.github/workflows/build_deploy.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup repo
        uses: actions/checkout@v4

      - name: Install pandoc
        run: |
          wget -q https://github.com/jgm/pandoc/releases/download/3.7.0.2/pandoc-3.7.0.2-1-amd64.deb
          sudo dpkg -i pandoc-3.7.0.2-1-amd64.deb
          rm pandoc-3.7.0.2-1-amd64.deb

      - name: Build slides
        run: >
          pandoc -t revealjs -s slides.md -o index.html
          --slide-level=3
          --variable revealjs-url=https://cdn.jsdelivr.net/npm/reveal.js@5
          --variable width=1200
          --variable margin=0.04
          --include-after-body=mermaid-init.html

      - name: Package site
        run: |
          mkdir -p _site
          cp index.html styles.css _site/
          [ -d assets ] && cp -r assets _site/assets || true
          touch _site/.nojekyll

      - name: Publish to gh-pages branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd _site
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "deploy: rebuild site"
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
